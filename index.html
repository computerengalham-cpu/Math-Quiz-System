<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Quiz System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<!-- ================= LOGIN PAGE ================= -->
<main id="loginPage">
    <div class="container py-5">
        <h2 class="mb-4">Login</h2>

        <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email">
        <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password">

        <button id="loginBtn" class="btn btn-primary">Login</button>

        <div id="loginError" class="alert alert-danger mt-3 d-none">
            Wrong Email or Password
        </div>
    </div>
</main>


<!-- ================= TEST PAGE ================= -->
<section id="testPage" class="d-none">
    <div class="container py-5">

        <div class="d-flex justify-content-between mb-4">
            <h2>Math Test</h2>
            <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>

        <!-- Step 1 -->
        <div id="setupBox">
            <input type="number" id="questionCount" class="form-control mb-3"
                   placeholder="Enter number of questions">
            <button id="startBtn" class="btn btn-success">Start Test</button>
        </div>

        <!-- Questions -->
        <div id="questionsBox" class="mt-4"></div>

        <!-- Submit -->
        <button id="submitBtn" class="btn btn-primary w-100 mt-3 d-none">
            Submit Answers
        </button>

        <!-- Result -->
        <div id="resultBox" class="alert alert-info mt-3 d-none"></div>

    </div>
</section>


<script src="./JS/main.js"></script>
</body>
</html>
